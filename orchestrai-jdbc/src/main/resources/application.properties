# =============================================================================
# orchestrai-jdbc — dev runner (Flyway + Panache against local Postgres)
# Run: docker compose up -d && mvn quarkus:dev -pl orchestrai-jdbc
# =============================================================================

quarkus.application.name=orchestrai-jdbc
quarkus.http.port=8090

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=orchestrai
quarkus.datasource.password=orchestrai
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/orchestrai

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.packages=io.orchestrai.jdbc.entity
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=false

quarkus.smallrye-health.root-path=/health

%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."io.orchestrai".level=DEBUG
