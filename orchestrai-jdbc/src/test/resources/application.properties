quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=orchestrai
quarkus.datasource.password=orchestrai
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/orchestrai

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.packages=io.orchestrai.jdbc.entity

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
