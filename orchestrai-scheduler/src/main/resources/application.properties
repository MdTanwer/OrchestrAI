# =============================================================================
# orchestrai-scheduler — cron + Kafka external triggers
# =============================================================================

quarkus.application.name=orchestrai-scheduler
quarkus.http.port=8083

# --- PostgreSQL (read flows/triggers) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=orchestrai
quarkus.datasource.password=orchestrai
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/orchestrai

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=false

# --- Kafka ---
kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.auto.offset.reset=earliest

# TODO: wire channels when implementing ExecutionPublisher / KafkaTriggerConsumer
# mp.messaging.outgoing.executions-out.connector=smallrye-kafka
# mp.messaging.outgoing.executions-out.topic=executions

# Quartz cron (Quarkus scheduler)
quarkus.scheduler.enabled=true

%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."io.orchestrai".level=DEBUG
