# =============================================================================
# orchestrai-api-server — local defaults (override with env vars in production)
# =============================================================================

quarkus.application.name=orchestrai-api-server
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# --- PostgreSQL (docker-compose postgres service) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=orchestrai
quarkus.datasource.password=orchestrai
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/orchestrai

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway migrations live in orchestrai-jdbc JAR (db/migration)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- Kafka (docker-compose kafka service, host listener on 9092) ---
kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.auto.offset.reset=earliest

# TODO: wire channels when implementing producers/consumers
# mp.messaging.outgoing.executions-out.connector=smallrye-kafka
# mp.messaging.outgoing.executions-out.topic=executions
# mp.messaging.incoming.task-logs-in.connector=smallrye-kafka
# mp.messaging.incoming.task-logs-in.topic=task-logs

# --- Auth (enable in Step 6 — add jwt-private-key.pem / jwt-public-key.pem to resources) ---
%dev.quarkus.smallrye-jwt.enabled=false
orchestrai.jwt.issuer=orchestrai

# --- Dev profile ---
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."io.orchestrai".level=DEBUG
