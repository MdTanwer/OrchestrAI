# =============================================================================
# orchestrai-executor — Kafka execution brain (no public REST API in MVP)
# =============================================================================

quarkus.application.name=orchestrai-executor
quarkus.http.port=8081

# --- PostgreSQL ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=orchestrai
quarkus.datasource.password=orchestrai
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/orchestrai

quarkus.hibernate-orm.database.generation=none

# Migrations run from api-server only (avoid concurrent Flyway).
# Start executor after api-server has applied Flyway (e.g. compose depends_on + healthcheck).
quarkus.flyway.migrate-at-start=false

# --- Kafka ---
kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.auto.offset.reset=earliest

# TODO: wire channels when implementing consumers/producers.
# Enable together with api-server, worker, and scheduler (see KafkaTopics in orchestrai-messaging).
# mp.messaging.incoming.executions-in.connector=smallrye-kafka
# mp.messaging.incoming.executions-in.topic=executions
# mp.messaging.incoming.task-results-in.connector=smallrye-kafka
# mp.messaging.incoming.task-results-in.topic=task-results
# mp.messaging.outgoing.task-runs-out.connector=smallrye-kafka
# mp.messaging.outgoing.task-runs-out.topic=task-runs
# mp.messaging.outgoing.execution-events-out.connector=smallrye-kafka
# mp.messaging.outgoing.execution-events-out.topic=execution-events

%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."io.orchestrai".level=DEBUG
