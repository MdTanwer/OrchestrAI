# =============================================================================
# orchestrai-worker — stateless task executor (Kafka only, no PostgreSQL)
# =============================================================================

quarkus.application.name=orchestrai-worker
quarkus.http.port=8082

# Unique worker id for task_runs.worker_id (override per instance in production)
orchestrai.worker.id=${HOSTNAME:worker-local-1}

# --- Kafka ---
kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.smallrye-kafka.auto.offset.reset=earliest

# TODO: wire channels when implementing WorkerConsumer.
# Enable together with api-server, executor, and scheduler (see KafkaTopics in orchestrai-messaging).
# mp.messaging.incoming.task-runs-in.connector=smallrye-kafka
# mp.messaging.incoming.task-runs-in.topic=task-runs
# mp.messaging.outgoing.task-results-out.connector=smallrye-kafka
# mp.messaging.outgoing.task-results-out.topic=task-results
# mp.messaging.outgoing.task-logs-out.connector=smallrye-kafka
# mp.messaging.outgoing.task-logs-out.topic=task-logs
# mp.messaging.outgoing.dead-letter-out.connector=smallrye-kafka
# mp.messaging.outgoing.dead-letter-out.topic=dead-letter

%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."io.orchestrai".level=DEBUG
