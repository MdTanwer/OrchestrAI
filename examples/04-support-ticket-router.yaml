# Real use case: B2B SaaS — Zendesk/Intercom webhook creates ticket; AI routes to billing/tech/general.
# Goals: Triggers (webhook) | Connected agents | G6 one ingress, specialized prompts

id: support-ticket-router
namespace: production.support

description: "Classify inbound ticket and draft a reply with the right specialist agent."

labels:
  team: support
  channel: email

triggers:
  - id: helpdesk-webhook
    type: webhook
    path: /hooks/support-ticket
    description: "Payload from Zendesk or Intercom on new ticket."

inputs:
  - id: ticketId
    type: STRING
    required: true
  - id: ticketBody
    type: STRING
    required: true
  - id: customerId
    type: STRING
    required: true
  - id: customerPlan
    type: STRING
    defaults: "standard"

tasks:
  - id: classify
    type: openai.chat
    model: gpt-4o-mini
    prompt: |
      Classify into exactly one word: billing, technical, or general.
      Plan: {{ inputs.customerPlan }}
      Ticket: {{ inputs.ticketBody }}

  - id: route
    type: core.if
    condition: "{{ outputs.classify.response == 'billing' }}"
    then:
      - id: billing-agent
        type: openai.chat
        model: gpt-4o
        prompt: |
          Draft a reply for a {{ inputs.customerPlan }} customer about billing/invoices.
          Be empathetic; cite self-serve refund policy if applicable.
          Ticket: {{ inputs.ticketBody }}
      - id: save-reply
        type: http.request
        method: POST
        url: "https://helpdesk.example.com/api/v2/tickets/{{ inputs.ticketId }}/draft"
        body: "{{ outputs.billing-agent.response }}"
    else:
      - id: technical-or-general
        type: core.if
        condition: "{{ outputs.classify.response == 'technical' }}"
        then:
          - id: technical-agent
            type: openai.chat
            model: gpt-4o
            prompt: |
              Draft troubleshooting steps for API/integration issues. Ask for requestId if missing.
              Ticket: {{ inputs.ticketBody }}
          - id: save-reply
            type: http.request
            method: POST
            url: "https://helpdesk.example.com/api/v2/tickets/{{ inputs.ticketId }}/draft"
            body: "{{ outputs.technical-agent.response }}"
        else:
          - id: general-agent
            type: openai.chat
            model: gpt-4o
            prompt: |
              Draft a friendly general support reply. Ticket: {{ inputs.ticketBody }}
          - id: save-reply
            type: http.request
            method: POST
            url: "https://helpdesk.example.com/api/v2/tickets/{{ inputs.ticketId }}/draft"
            body: "{{ outputs.general-agent.response }}"
