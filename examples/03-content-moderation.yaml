# Real use case: Marketplace — moderate seller product listings before they go live.
# Goals: G2 reliability (parallel checks) | G5 parallel execution | Production namespace

id: listing-moderation
namespace: production.marketplace

description: "Normalize listing copy, run policy + language checks in parallel, publish or reject."

labels:
  team: trust-safety
  surface: seller-listings

inputs:
  - id: listingId
    type: STRING
    required: true
  - id: title
    type: STRING
    required: true
  - id: description
    type: STRING
    required: true
  - id: sellerId
    type: STRING
    required: true

variables:
  defaultModel: gpt-4o

tasks:
  - id: normalize-listing
    type: openai.chat
    model: "{{ vars.defaultModel }}"
    prompt: |
      Fix grammar and remove ALL-CAPS spam. Keep meaning. Return JSON:
      { "title": "...", "description": "..." }
      Title: {{ inputs.title }}
      Description: {{ inputs.description }}

  - id: policy-checks
    type: core.parallel
    tasks:
      - id: toxicity
        type: openai.moderation
        input: "{{ outputs.normalize-listing.response }}"
      - id: prohibited-items
        type: openai.chat
        model: gpt-4o-mini
        prompt: |
          Does this listing violate marketplace policy (weapons, counterfeit, medical claims)?
          Reply only: pass or fail.
          Listing: {{ outputs.normalize-listing.response }}

  - id: listing-gate
    type: core.if
    condition: "{{ outputs.policy-checks.toxicity.flagged || outputs.policy-checks.prohibited-items.response == 'fail' }}"
    then:
      - id: reject-listing
        type: http.request
        method: POST
        url: "https://marketplace.example.com/v1/listings/{{ inputs.listingId }}/reject"
        body: |
          {
            "sellerId": "{{ inputs.sellerId }}",
            "reason": "trust_safety_failed"
          }
    else:
      - id: publish-listing
        type: http.request
        method: POST
        url: "https://marketplace.example.com/v1/listings/{{ inputs.listingId }}/publish"
        body: "{{ outputs.normalize-listing.response }}"

onFailure:
  - id: alert-trust-safety
    type: http.request
    method: POST
    url: "https://hooks.slack.com/services/EXAMPLE/trust-safety"
    body: "listing-moderation failed for {{ inputs.listingId }}"
