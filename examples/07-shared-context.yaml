# Real use case: HR tech — phone-screen bot asks questions; coach model suggests follow-ups in same thread.
# Goals: Shared context (P2) | Multi-LLM handoff without re-sending full history manually

id: interview-screening-assistant
namespace: production.hr

description: "Interviewer agent runs the screen; coach agent continues the same conversation context."

labels:
  team: talent
  product: ats-plugin

inputs:
  - id: candidateName
    type: STRING
    required: true
  - id: role
    type: STRING
    required: true
  - id: competencyRubric
    type: STRING
    required: true
    description: "Bulleted rubric recruiters pasted from the job scorecard."

tasks:
  - id: run-screen
    type: openai.chat
    contextKey: "screen-{{ inputs.candidateName }}-{{ inputs.role }}"
    model: gpt-4o
    prompt: |
      Role: {{ inputs.role }}
      Candidate: {{ inputs.candidateName }}
      Rubric: {{ inputs.competencyRubric }}
      Ask exactly three behavioral questions numbered 1–3.

  - id: recruiter-coach
    type: anthropic.chat
    contextKey: "screen-{{ inputs.candidateName }}-{{ inputs.role }}"
    model: claude-3-5-sonnet
    prompt: |
      Based on the interview thread so far, suggest two sharp follow-up questions
      if answers were vague. Reference competencies from the rubric.
