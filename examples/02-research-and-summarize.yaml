# Real use case: Product marketing — weekly competitive intel briefing for leadership.
# Goals: Connected agents | Multi-LLM | Cost metrics on each step (see 08)

id: competitive-intel-briefing
namespace: production.product-marketing

description: "Research a competitor move, then produce a 150-word exec brief (GPT → Claude)."

labels:
  team: product-marketing
  cost-center: gtm

inputs:
  - id: competitor
    type: STRING
    required: true
  - id: announcement
    type: STRING
    required: true
    description: "Press release, blog post, or pricing page diff."

variables:
  researchModel: gpt-4o
  summaryModel: claude-3-5-sonnet

tasks:
  - id: analyze-announcement
    type: openai.chat
    model: "{{ vars.researchModel }}"
    prompt: |
      Competitor: {{ inputs.competitor }}
      Announcement: {{ inputs.announcement }}
      List: (1) what changed (2) customer impact (3) 3 suggested responses for our PMM team.
      Bullets only, no intro.

  - id: exec-brief
    type: anthropic.chat
    model: "{{ vars.summaryModel }}"
    prompt: |
      Write a 150-word briefing for our CPO. Tone: factual, no hype.
      Analysis:
      {{ outputs.analyze-announcement.response }}
