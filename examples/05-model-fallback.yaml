# Real use case: Finance ops — extract invoice line items; must complete even if OpenAI rate-limits.
# Goals: G2 reliability | Retry + provider fallback

id: invoice-line-item-extraction
namespace: production.finance

description: "Parse vendor invoice PDF text into structured JSON; fallback from OpenAI to Claude."

labels:
  team: finance-ops
  compliance: ap-automation

inputs:
  - id: invoiceText
    type: STRING
    required: true
  - id: vendorId
    type: STRING
    required: true

tasks:
  - id: extract-lines
    type: openai.chat
    model: gpt-4o
    timeout: "2m"
    retry:
      maxAttempts: 2
      backoff: exponential
      initialDelay: "2s"
    prompt: |
      Vendor: {{ inputs.vendorId }}
      Extract line items as JSON array: [{ "sku": "", "qty": 0, "unitPriceUsd": 0 }]
      Invoice text:
      {{ inputs.invoiceText }}
    fallback:
      type: anthropic.chat
      model: claude-3-5-sonnet
      prompt: |
        Vendor: {{ inputs.vendorId }}
        Extract line items as JSON array: [{ "sku": "", "qty": 0, "unitPriceUsd": 0 }]
        Invoice text:
        {{ inputs.invoiceText }}
      fallbackOn:
        - RATE_LIMIT
        - TIMEOUT
        - PROVIDER_ERROR

  - id: post-to-erp
    type: http.request
    method: POST
    url: "https://erp.example.com/v1/ap/invoices"
    body: |
      {
        "vendorId": "{{ inputs.vendorId }}",
        "lines": {{ outputs.extract-lines.response }},
        "extractionCostUsd": {{ outputs.extract-lines.costUsd }}
      }
