# Real use case: In-app copilot — answer from pasted release notes (smoke test / MVP validation).
# Goals: G1 simplicity (< 20 lines of task config) | G6 focus on prompt, not plumbing

id: release-notes-copilot
namespace: examples.getting-started

description: "Answer a product question using only the release notes snippet provided at runtime."

inputs:
  - id: question
    type: STRING
    required: true
  - id: releaseNotes
    type: STRING
    required: true
    description: "Markdown release notes for the current version."

variables:
  model: gpt-4o-mini

tasks:
  - id: answer
    type: openai.chat
    model: "{{ vars.model }}"
    prompt: |
      Answer using ONLY the release notes. If unknown, say "Not in this release."
      Question: {{ inputs.question }}
      Release notes:
      {{ inputs.releaseNotes }}
