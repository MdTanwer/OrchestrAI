# Real use case: Regulated industry — AI drafts customer email; compliance must approve before SendGrid.
# Goals: Human-in-the-loop | G6 agents draft, humans gate side effects

id: regulated-email-campaign
namespace: production.marketing

description: "Draft lifecycle email for healthcare subscribers; compliance approves before send."

labels:
  team: marketing
  compliance: hipaa-marketing

inputs:
  - id: campaignId
    type: STRING
    required: true
  - id: segment
    type: STRING
    required: true
  - id: keyMessage
    type: STRING
    required: true

tasks:
  - id: draft-email
    type: openai.chat
    model: gpt-4o
    prompt: |
      Draft a plain-text email (subject + body) for segment "{{ inputs.segment }}".
      Message pillar: {{ inputs.keyMessage }}.
      Rules: no medical claims, include unsubscribe line, max 120 words.

  - id: compliance-review
    type: human.approval
    message: "Approve email for campaign {{ inputs.campaignId }} (segment: {{ inputs.segment }})?"
    data: "{{ outputs.draft-email.response }}"
    approvers:
      - compliance@example.com
      - marketing-lead@example.com
    timeout: "48h"
    onTimeout: REJECT

  - id: send-approved
    type: http.request
    if: "{{ outputs.compliance-review.approved }}"
    method: POST
    url: "https://api.sendgrid.com/v3/mail/send"
    body: |
      {
        "campaignId": "{{ inputs.campaignId }}",
        "content": "{{ outputs.draft-email.response }}"
      }

  - id: audit-rejected
    type: http.request
    if: "{{ !outputs.compliance-review.approved }}"
    method: POST
    url: "https://audit.example.com/v1/marketing/blocked"
    body: '{"campaignId":"{{ inputs.campaignId }}","reason":"compliance_rejected"}'
